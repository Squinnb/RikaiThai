<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 220px;
      padding: 12px;
      font-family: sans-serif;
      background: #1a1a1a;
      color: #fff;
    }
    h3 {
      margin: 0 0 10px;
      font-size: 14px;
      color: #aaa;
    }

    /* Toggle switch */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      margin-top: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid #333;
    }
    .toggle-label {
      font-size: 10px;
      
    }
    .icon-label {
      font-size: 18px;
      font-weight: bold;
    }
    .switch {
      position: relative;
      width: 20px;
      height: 12px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #555;
      border-radius: 12px;
      transition: 0.2s;
    }
    .slider:before {
      content: "";
      position: absolute;
      width: 10px;
      height: 10px;
      left: 1px;
      bottom: 1px;
      background: white;
      border-radius: 50%;
      transition: 0.2s;
    }
    input:checked + .slider {
      background: #4CAF50;
    }
    input:checked + .slider:before {
      transform: translateX(8px);
    }

    /* Theme buttons */
    .theme-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 8px 10px;
      margin-bottom: 8px;
      border-radius: 6px;
      border: 2px solid transparent;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
      box-sizing: border-box;
    }
    .theme-btn.active[data-theme="solar"] {
      border-color: #cb4b16;
    }
    .theme-btn.active[data-theme="midnight"] {
      border-color: #7c6af7;
    }
    .theme-btn.active[data-theme="terminal"] {
      border-color: #00ff91df;
    }
    .swatch {
      width: 18px;
      height: 18px;
      border-radius: 3px;
      flex-shrink: 0;
      border: 1px solid rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

  <div class="h2">
    <span class="icon-label">เข้าใจ Thai</span>
  </div>
  <div class="toggle-row">
    <span class="toggle-label">Enable</span>
    <label class="switch">
      <input type="checkbox" id="enableToggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <h3>Choose Theme</h3>

  <button class="theme-btn" data-theme="solar" style="background:#282725; color:#657b83;">
    <div class="swatch" style="background:#cb4b16;"></div>
    Solar
  </button>

  <button class="theme-btn" data-theme="midnight" style="background:#1a1b2e; color:#c8c8e8;">
    <div class="swatch" style="background:#7c6af7;"></div>
    Midnight
  </button>

  <button class="theme-btn" data-theme="terminal" style="background:#000; color:#fff;">
    <div class="swatch" style="background:#00dd7ddf;"></div>
    Terminal
  </button>

  <script src="popupscript.js"></script>
</body>
</html>
